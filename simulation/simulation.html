<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forest Wildfire Rescue — 3D Simulation</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #0a0a0f; font-family: 'Segoe UI', system-ui, sans-serif; }
        #hud { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        #title {
            position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
            color: #ff6600; font-size: 15px; font-weight: 700; text-transform: uppercase;
            letter-spacing: 3px; text-shadow: 0 0 20px rgba(255,100,0,0.5);
        }
        #cam-panel {
            position: absolute; top: 12px; left: 12px;
            display: flex; flex-direction: column; gap: 4px; pointer-events: auto;
        }
        .cam-btn {
            background: rgba(10,15,30,0.85); border: 1px solid rgba(255,100,0,0.3);
            color: #8899aa; padding: 6px 12px; border-radius: 5px; cursor: pointer;
            font-size: 10px; font-family: inherit; transition: all 0.2s; text-align: left;
        }
        .cam-btn:hover { background: rgba(255,100,0,0.15); color: #ff8800; border-color: #ff8800; }
        .cam-btn.active { background: rgba(255,100,0,0.2); color: #ff8800; border-color: #ff8800; box-shadow: 0 0 10px rgba(255,100,0,0.2); }
        #right-panel {
            position: absolute; top: 12px; right: 12px; width: 280px;
            display: flex; flex-direction: column; gap: 8px; pointer-events: auto;
        }
        #minimap-box {
            background: rgba(10,15,30,0.92); border: 1px solid rgba(255,100,0,0.2);
            border-radius: 8px; padding: 10px;
        }
        #minimap-box h4 { color: #ff8800; font-size: 11px; margin-bottom: 6px; letter-spacing: 1.5px; }
        #minimap { width: 260px; height: 260px; border-radius: 4px; border: 1px solid #1a2a1a; }
        #thinking-box {
            background: rgba(10,15,30,0.92); border: 1px solid rgba(255,100,0,0.2);
            border-radius: 8px; padding: 10px;
        }
        #thoughts-content { max-height: 360px; overflow-y: auto; }
        #thoughts-content::-webkit-scrollbar { width: 4px; }
        #thoughts-content::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
        #thinking-box h4 { color: #ff8800; font-size: 11px; margin-bottom: 6px; letter-spacing: 1.5px; }
        .panel-toggle { cursor: pointer; color: #8899aa; margin-right: 5px; font-family: monospace; font-size: 12px; }
        .panel-toggle:hover { color: #fff; }
        .thought-entry { margin: 4px 0; padding: 5px 7px; border-radius: 4px; font-size: 10px; line-height: 1.4; }
        .thought-entry.reason { background: rgba(180,100,255,0.08); color: #c8a0ff; border-left: 2px solid #8844dd; }
        .thought-entry.action { background: rgba(0,180,255,0.08); color: #66ccff; border-left: 2px solid #0088cc; }
        .thought-entry.alert { background: rgba(118,255,3,0.08); color: #76ff03; border-left: 2px solid #55cc00; }
        .thought-entry.warning { background: rgba(255,170,0,0.08); color: #ffbb33; border-left: 2px solid #cc8800; }
        .thought-entry.danger { background: rgba(255,50,0,0.08); color: #ff6644; border-left: 2px solid #cc2200; }
        .thought-entry.info { background: rgba(0,255,180,0.08); color: #88eedd; border-left: 2px solid #00aa88; }
        .thought-entry.mcp-call { background: rgba(0,200,180,0.06); color: #44ccbb; border-left: 2px solid #009988; font-family: 'Menlo','Consolas',monospace; font-size: 9px; }
        .thought-entry.mcp-resp { background: rgba(0,200,180,0.04); color: #55aa99; border-left: 2px solid #00776655; font-family: 'Menlo','Consolas',monospace; font-size: 9px; }
        .thought-entry.phase {
            background: rgba(255,255,255,0.05); color: #fff; border: none; font-weight: 700;
            text-align: center; font-size: 11px; padding: 10px 0; margin: 10px 0;
            border-top: 1px dashed #555; border-bottom: 1px dashed #555; letter-spacing: 1px;
        }
        .thought-drone-tag { font-size: 9px; font-weight: 700; margin-right: 4px; padding: 1px 4px; border-radius: 2px; }
        #mcp-toggle {
            display: inline-block; margin-left: 6px; padding: 2px 8px; border-radius: 4px; cursor: pointer;
            font-size: 9px; font-weight: 600; border: 1px solid #009988; color: #44ccbb;
            background: rgba(0,153,136,0.1); pointer-events: auto; transition: all 0.2s; vertical-align: middle;
        }
        #mcp-toggle:hover { background: rgba(0,153,136,0.25); }
        #mcp-toggle.active { background: rgba(0,153,136,0.3); box-shadow: 0 0 8px rgba(0,153,136,0.3); }
        #status {
            position: absolute; bottom: 12px; left: 12px;
            background: rgba(10,15,30,0.92); border: 1px solid rgba(255,100,0,0.2);
            border-radius: 8px; padding: 12px 16px; min-width: 260px; max-height: 220px;
            overflow-y: auto; color: #ccd; font-size: 11px; pointer-events: auto;
        }
        #status h3 { color: #ff8800; margin-bottom: 6px; font-size: 12px; letter-spacing: 2px; }
        .sr { display: flex; justify-content: space-between; margin: 2px 0; }
        .sl { color: #556; }
        .sv { color: #aab; font-weight: 600; }
        .sv.det { color: #76ff03; }
        .sv.low { color: #ffaa00; }
        #speed-slider-box { margin-top: 6px; display: flex; align-items: center; gap: 6px; }
        #speed-slider-box label { color: #888; font-size: 10px; }
        #speed-slider { width: 100px; accent-color: #ff8800; cursor: pointer; }
        #speed-val { color: #ff8800; font-size: 10px; font-weight: 600; min-width: 28px; }
        #daynight-btn {
            background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.2);
            color: #ccd; padding: 3px 10px; border-radius: 4px; cursor: pointer;
            font-size: 10px; font-family: inherit; transition: all 0.2s; pointer-events: auto;
        }
        #daynight-btn:hover { background: rgba(255,255,255,0.15); }
        #alert-box {
            position: absolute; bottom: 12px; right: 12px;
            background: rgba(118,255,3,0.12); border: 1px solid rgba(118,255,3,0.4);
            border-radius: 8px; padding: 10px 14px; color: #76ff03; font-size: 11px;
            font-weight: 600; display: none; max-width: 200px;
        }
        #alert-box.show { display: block; animation: ap 1s infinite; }
        @keyframes ap { 0%,100%{box-shadow:0 0 8px rgba(118,255,3,0.2)} 50%{box-shadow:0 0 20px rgba(118,255,3,0.4)} }
        #instr { position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%); color: #334; font-size: 9px; letter-spacing: 1px; }
        .drone-label {
            position: absolute; pointer-events: none; z-index: 15;
            background: rgba(10,15,30,0.88); border: 1px solid rgba(255,140,0,0.4);
            border-radius: 5px; padding: 4px 8px; font-size: 9px; line-height: 1.4;
            color: #ccd; font-family: 'Segoe UI', system-ui, sans-serif;
            white-space: nowrap; transform: translate(-50%, -100%);
            box-shadow: 0 2px 8px rgba(0,0,0,0.5);
        }
        .drone-label .dl-name { font-weight: 700; font-size: 10px; }
        .drone-label .dl-bat { color: #76ff03; }
        .drone-label .dl-bat.low { color: #ffaa00; }
        .drone-label .dl-bat.dead { color: #ff3322; }
        .drone-label .dl-rtb { color: #66ccff; font-size: 8px; }
        #start-controls {
            position: absolute; bottom: 20px; right: 20px;
            background: rgba(10,15,30,0.9); border: 2px solid #ff8800;
            padding: 20px; border-radius: 12px; text-align: center; z-index: 2000;
            display: flex; flex-direction: column; align-items: center; gap: 15px;
            box-shadow: 0 0 20px rgba(255,100,0,0.3); pointer-events: auto; backdrop-filter: blur(8px);
        }
        #mission-goal {
            background: #1a2233; color: #00ff88; border: 1px solid #ff8800; 
            padding: 8px 15px; border-radius: 6px; cursor: pointer; 
            font-family: inherit; font-size: 13px; font-weight: bold;
            text-transform: uppercase; outline: none; transition: border-color 0.2s;
        }
        #mission-goal:hover { border-color: #ffaa00; }
        #mission-goal:disabled { opacity: 0.6; cursor: not-allowed; border-color: #555; color: #888; }
        #start-controls label {
            color: #00ff88; font-weight: bold; letter-spacing: 2px; font-size: 18px; text-transform: uppercase;
        }
        #start-controls input[type="range"] {
            width: 250px; accent-color: #00ff88; cursor: pointer; height: 6px;
        }
        #start-btn {
            background: linear-gradient(135deg, #ff6600, #ff3300); border: 2px solid #ff8800;
            color: #fff; padding: 16px 40px; border-radius: 10px; cursor: pointer;
            font-size: 18px; font-weight: 700; font-family: inherit;
            letter-spacing: 3px; text-transform: uppercase;
            box-shadow: 0 0 30px rgba(255,100,0,0.3), 0 4px 15px rgba(0,0,0,0.4);
            transition: all 0.3s;
        }
        #start-btn:hover { transform: scale(1.05); box-shadow: 0 0 50px rgba(255,100,0,0.6); }
        .goal-label { color: #888 !important; font-size: 10px !important; letter-spacing: 1px !important; margin-bottom: -10px; }

        /* Success Popup */
        #success-modal {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center;
            z-index: 100; backdrop-filter: blur(8px); pointer-events: auto;
        }
        #success-content {
            background: linear-gradient(135deg, rgba(30,40,60,0.9), rgba(10,15,25,0.95));
            border: 2px solid #00ff88; border-radius: 20px; padding: 40px;
            text-align: center; color: #fff; max-width: 450px; width: 90%;
            box-shadow: 0 0 50px rgba(0,255,136,0.3);
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        #success-content h2 {
            font-size: 32px; color: #00ff88; margin-bottom: 20px;
            letter-spacing: 4px; text-transform: uppercase;
        }
        .stat-row { font-size: 18px; margin: 10px 0; color: #ccd; }
        .stat-row b { color: #fff; }
        #restart-btn-big {
            margin-top: 30px; background: #00ff88; color: #000; border: none;
            padding: 12px 30px; border-radius: 8px; font-weight: bold; font-size: 18px;
            cursor: pointer; transition: 0.2s;
        }
        #restart-btn-big:hover { background: #00cc6e; transform: scale(1.05); }
    </style>
</head>
<body>
<div id="hud">
    <div id="title">Forest Wildfire Rescue</div>
    <div id="cam-panel">
        <button class="cam-btn active" onclick="switchCam(-1)">🌐 Overview <span style="color:#445;font-size:9px">[0]</span></button>

            <div id="sc">Initializing...</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ─── CONFIG ───
const GRID = 200, SECTORS = 10, CELL = GRID / SECTORS;  // 10×10 = each sub-tile is 20×20
const SCAN_RADIUS = 14.5; // Enough to radius-cover a 20x20 cell (sqrt(10^2+10^2) ≈ 14.14)

let isPaused = false;
let pauseStartTime = 0;
let totalPausedTime = 0;

window.togglePause = function() {
    isPaused = !isPaused;
    const btn = document.getElementById('pause-btn');
    if (btn) {
        btn.innerHTML = isPaused ? '▶ Resume' : '⏸ Pause';
        btn.style.color = isPaused ? '#55ff55' : '#ffd855';
        btn.style.borderColor = isPaused ? 'rgba(85,255,85,0.3)' : 'rgba(255,200,50,0.3)';
        btn.style.background = isPaused ? 'rgba(85,255,85,0.15)' : 'rgba(255,200,50,0.15)';
    }
    
    // Manage paused time to keep the mission clock accurate
    if (isPaused) {
        pauseStartTime = performance.now();
    } else {
        totalPausedTime += (performance.now() - pauseStartTime);
    }
};

window.togglePanel = function(contentId, btnId) {
    const el = document.getElementById(contentId);
    const btn = document.getElementById(btnId);
    if (!el || !btn) return;
    if (el.style.display === 'none') {
        el.style.display = 'block';
        btn.textContent = '[-]';
    } else {
        el.style.display = 'none';
        btn.textContent = '[+]';
    }
};

let MOVE_SPEED = 0.2;
window.updateSpeed = function(v) {
    MOVE_SPEED = v / 100;
    document.getElementById('speed-val').textContent = MOVE_SPEED.toFixed(2);
};

// Connection Status Pinger
setInterval(() => {
    const dot = document.getElementById('llm-dot');
    if (dot) {
        if (typeof mcpClient !== 'undefined' && mcpClient.connected) {
            dot.style.color = '#33ff33';
            dot.parentElement.title = 'Connected to MCP Server (SSE)';
        } else {
            dot.style.color = '#ff3333';
            dot.parentElement.title = 'MCP Server unreachable';
        }
    }
}, 2000);

let showScannedSectors = false;
window.toggleScannedSectors = function() {
    showScannedSectors = !showScannedSectors;
    const btn = document.getElementById('scan-toggle-btn');
    if (btn) {
        btn.style.background = showScannedSectors ? 'rgba(50,150,255,0.4)' : 'rgba(50,150,255,0.15)';
        btn.style.color = showScannedSectors ? '#ffffff' : '#66bbff';
    }
};

let useLLM = true;
window.toggleBrain = function() {
    useLLM = !useLLM;
    const btn = document.getElementById('brain-btn');
    if (btn) {
        btn.innerHTML = useLLM ? '🧠 Brain: LLM' : '🧠 Brain: Local';
        btn.style.color = useLLM ? '#ff88ff' : '#d888ff';
        btn.style.background = useLLM ? 'rgba(255,50,255,0.3)' : 'rgba(180,50,255,0.15)';
    }
};

window.addEventListener('DOMContentLoaded', () => {
    const btn = document.getElementById('brain-btn');
    if (btn) {
        btn.innerHTML = useLLM ? '🧠 Brain: LLM' : '🧠 Brain: Local';
        btn.style.color = useLLM ? '#ff88ff' : '#d888ff';
        btn.style.background = useLLM ? 'rgba(255,50,255,0.3)' : 'rgba(180,50,255,0.15)';
    }
});

const DRAIN_PER_UNIT = 0.02; // battery % drained per unit of distance traveled (clear zone)
const DRONE_FLY_HEIGHT = 6;
const OBSTACLE_RADIUS = 1.5;
const AVOIDANCE_LOOKAHEAD = 6;
const AVOIDANCE_STRENGTH = 0.7;
const DRONE_COLORS = ['#3388ff','#ff5533','#33cc55','#ff9900','#cc44ff'];
const DRONE_NAMES = ['drone_1','drone_2','drone_3','drone_4','drone_5'];
const SURVIVORS = [];
const BASE = {x: 5, z: 5};
const drones = []; // Moved initialization to startMission
const scanSpheres = []; // Moved initialization to startMission
let thoughtIdCounter = 0;
let isBatchThinking = false;

// Hazards defined on original 5×5 macro-grid, expanded to 10×10
const NO_FLY_MACRO = [];
const FIRE_MACRO   = ["3_2","4_2","2_3","3_3"];

// Expand macro sector (5×5) into 4 sub-sectors (10×10)
function expandMacro(list) {
    const s = new Set();
    for (const key of list) {
        const [mr,mc] = key.split("_").map(Number);
        s.add(`S${mr*2}_${mc*2}`);
        s.add(`S${mr*2+1}_${mc*2}`);
        s.add(`S${mr*2}_${mc*2+1}`);
        s.add(`S${mr*2+1}_${mc*2+1}`);
    }
    return s;
}
const NO_FLY = expandMacro(NO_FLY_MACRO);
const FIRE   = expandMacro(FIRE_MACRO);
const SMOKE  = new Set();
for (const f of FIRE) {
    const [r,c] = f.split("_").map(Number);
    for (const [dr,dc] of [[-1,0],[1,0],[0,-1],[0,1]]) {
        const nr=r+dr, nc=c+dc, k=`${nr}_${nc}`;
        if (nr>=0&&nr<SECTORS&&nc>=0&&nc<SECTORS&&!FIRE.has(k)&&!NO_FLY.has(k)) SMOKE.add(k);
    }
}
function hazardOf(r,c) {
    const k=`S${r}_${c}`;
    if (NO_FLY.has(k)) return "no_fly";
    if (FIRE.has(k)) return "fire";
    if (SMOKE.has(k)) return "smoke";
    return "clear";
}

// ─── REAL MCP CLIENT over SSE ───
const mcpClient = {
    connected: false,
    endpoint: null,
    requests: new Map(),
    nextId: 1,
    connect: function() {
        if (this.connected) return;
        const sseUrl = 'http://127.0.0.1:8000/sse';
        console.log(`[MCP] Connecting to ${sseUrl}...`);
        
        try {
            this.es = new EventSource(sseUrl);
            
            this.es.addEventListener('endpoint', (e) => {
                let path = e.data;
                this.endpoint = new URL(path, sseUrl).href;
                console.log(`[MCP] SSE Stream open. POST endpoint: ${this.endpoint}`);
                // Perform MCP Protocol Handshake
                this.initializeSession();
            });
            
            this.es.onmessage = (e) => {
                const data = JSON.parse(e.data);
                if (data.id && this.requests.has(data.id)) {
                    const {resolve, reject} = this.requests.get(data.id);
                    this.requests.delete(data.id);
                    if (data.error) reject(data.error);
                    else resolve(data.result);
                }
            };
            
            this.es.onerror = (err) => {
                console.warn('[MCP] EventSource error', err);
                this.connected = false;
            };
        } catch(e) { console.error('[MCP] Failed to create EventSource', e); }
    },
    
    send: function(payload) {
        return fetch(this.endpoint, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
    },

    initializeSession: async function() {
        try {
            // 1. Send initialize request
            const initId = this.nextId++;
            const initPromise = new Promise((resolve, reject) => {
                this.requests.set(initId, {resolve, reject});
                this.send({
                    jsonrpc: "2.0",
                    id: initId,
                    method: "initialize",
                    params: {
                        protocolVersion: "2024-11-05",
                        capabilities: {},
                        clientInfo: { name: "vhack-browser", version: "1.0.0" }
                    }
                });
            });
            
            await initPromise;
            
            // 2. Send initialized notification
            await this.send({
                jsonrpc: "2.0",
                method: "notifications/initialized"
            });
            
            this.connected = true;
            console.log('[MCP] Session Initialized successfully.');
            
            // AUTOMATIC RESET: Ensure backend matches a fresh frontend state on every page load
            this.callTool('reset_mission', {}).then(() => {
                console.log('[MCP] Backend state auto-reset for new session.');
            }).catch(e => console.warn('[MCP] Auto-reset failed:', e));
        } catch (e) {
            console.error('[MCP] Initialization failed', e);
        }
    },

    callTool: async function(name, args) {
        if (!this.connected || !this.endpoint) {
            throw new Error("MCP not fully connected/initialized yet");
        }
        const id = this.nextId++;
        const payload = {
            jsonrpc: "2.0",
            id: id,
            method: "tools/call",
            params: { name: name, arguments: args }
        };
        
        return new Promise((resolve, reject) => {
            this.requests.set(id, {resolve, reject});
            this.send(payload).then(res => {
                if (!res.ok) throw new Error("MCP POST failed: " + res.status);
            }).catch(e => {
                this.requests.delete(id);
                reject(e);
            });
        });
    }
};

function addThought(droneIdx, type, msg) {
    if (missionComplete) return; // Suppress all logs after mission ends
    let reasonPrefix = useLLM ? '🧠 REASONING (LLM): ' : '🧠 REASONING (LOCAL): ';
    const prefixes = {
        'action': '⚡ ACTION: ', 'reason': reasonPrefix, 'danger': '🚫 DANGER: ',
        'alert': '🔥 ALERT: ', 'warning': '⚠️ WARNING: ', 'info': '   i ', 'phase': ''
    };
    const formattedMsg = (prefixes[type] || '') + msg;

    // Ensure thoughtLogs has enough arrays for the current number of drones
    while (thoughtLogs.length < drones.length) {
        thoughtLogs.push([]);
    }

    const thoughtId = ++thoughtIdCounter;
    
    if (droneIdx === -1) {
        const t = { id: thoughtId, type, msg: formattedMsg, time: Date.now(), isMCP: false, global: true };
        for (let i = 0; i < drones.length; i++) { // Use drones.length here
            thoughtLogs[i].push(t);
            if (thoughtLogs[i].length > MAX_THOUGHTS) thoughtLogs[i].shift();
        }
        return;
    }
    
    thoughtLogs[droneIdx].push({ id: thoughtId, type, msg: formattedMsg, time: Date.now(), isMCP: false, global: false });
    if (thoughtLogs[droneIdx].length > MAX_THOUGHTS) thoughtLogs[droneIdx].shift();
}

function addMCP(droneIdx, callType, toolName, args, response) {
    if (missionComplete) return; // Suppress all logs after mission ends
    const callMsg = `⚡ ACTION: Calling ${toolName}()...<br><span style="color:#667788;font-size:8px;">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;INFO&nbsp;&nbsp;&nbsp;&nbsp; Processing request of type CallToolRequest       server.py:720</span>`;
    const respMsg = `   ℹ ${JSON.stringify(response)}`;
    thoughtLogs[droneIdx].push({ type: 'mcp-call', msg: callMsg, time: Date.now(), isMCP: true, global: false });
    thoughtLogs[droneIdx].push({ type: 'mcp-resp', msg: respMsg, time: Date.now()+1, isMCP: true, global: false });
    if (thoughtLogs[droneIdx].length > MAX_THOUGHTS) {
        thoughtLogs[droneIdx] = thoughtLogs[droneIdx].slice(-MAX_THOUGHTS);
    }
    
    // ACTUALLY execute the tool call on the Python server so it stays in sync
    if (useLLM && mcpClient && mcpClient.connected) {
        // We do this asynchronously without awaiting to not block the simulation loop
        mcpClient.callTool(toolName, args).catch(e => {
            console.warn(`[MCP Sync Error] Tool ${toolName} failed:`, e);
        });
    }
}

function renderThoughts() {
    const el = document.getElementById('thoughts');
    let entries = [];
    if (activeDrone >= 0) {
        entries = thoughtLogs[activeDrone].map(t => ({...t, drone: activeDrone}));
    } else {
        const seenGlobalIds = new Set();
        for (let i = 0; i < drones.length; i++) {
            thoughtLogs[i].forEach(t => {
                if (t.global) {
                    if (seenGlobalIds.has(t.id)) return;
                    seenGlobalIds.add(t.id);
                }
                entries.push({...t, drone: i});
            });
        }
        entries.sort((a,b) => a.time - b.time || (a.id - b.id));
        entries = entries.slice(-MAX_THOUGHTS);
    }
    // Filter MCP entries based on toggle
    if (!showMCP) entries = entries.filter(t => !t.isMCP);
    let html = '';
    entries.forEach(t => {
        if (t.global) {
            html += `<div class="thought-entry ${t.type}">${t.msg}</div>`;
        } else {
            const color = DRONE_COLORS[t.drone];
            const tag = `<span class="thought-drone-tag" style="background:${color}22;color:${color}">${DRONE_NAMES[t.drone]}</span>`;
            html += `<div class="thought-entry ${t.type}">${tag} ${t.msg}</div>`;
        }
    });
    // Check if user is scrolled to the bottom before rendering
    const parent = el.parentElement;
    const isAtBottom = parent.scrollHeight - parent.scrollTop <= parent.clientHeight + 10;
    
    el.innerHTML = html;
    
    // Only auto-scroll if they were already at the bottom
    if (isAtBottom) {
        parent.scrollTop = parent.scrollHeight;
    }
}

// ─── 2D MINIMAP ───
const mapCanvas = document.getElementById('minimap');
const mapCtx = mapCanvas.getContext('2d');
const MAP_W = 260, MAP_H = 260, MAP_PAD = 5;
const MAP_CELL = (MAP_W - MAP_PAD*2) / SECTORS;

function drawMinimap() {
    mapCtx.clearRect(0, 0, MAP_W, MAP_H);
    mapCtx.fillStyle = '#0c0c14';
    mapCtx.fillRect(0, 0, MAP_W, MAP_H);
    // Sector tiles
    for (let r = 0; r < SECTORS; r++) for (let c = 0; c < SECTORS; c++) {
        const h = hazardOf(r,c), scanned = sectorMeshes[`S${r}_${c}`]?.scanned;
        let fill = '#1a3a1a';
        if (h === 'no_fly') fill = '#222';
        else if (h === 'fire') fill = scanned ? '#3a2210' : '#441100';
        else if (h === 'smoke') fill = scanned ? '#2a2a18' : '#332810';
        else fill = scanned ? '#1a3a2a' : '#1a2a1a';
        const x = MAP_PAD + c * MAP_CELL, y = MAP_PAD + r * MAP_CELL;
        mapCtx.fillStyle = fill;
        mapCtx.fillRect(x+1, y+1, MAP_CELL-2, MAP_CELL-2);
        mapCtx.strokeStyle = '#2a3a2a'; mapCtx.lineWidth = 0.5;
        mapCtx.strokeRect(x+1, y+1, MAP_CELL-2, MAP_CELL-2);
        if (scanned && h !== 'no_fly') { mapCtx.fillStyle = '#33aa3322'; mapCtx.fillRect(x+1, y+1, MAP_CELL-2, MAP_CELL-2); }
        if (h === 'fire') { mapCtx.fillStyle = '#ff440066'; mapCtx.font = '12px sans-serif'; mapCtx.fillText('🔥', x+MAP_CELL/2-7, y+MAP_CELL/2+5); }
    }
    // Obstacles as tiny dots on the map
    mapCtx.fillStyle = '#33553322';
    obstacles.forEach(o => {
        const ox = MAP_PAD + (o.x / GRID) * (MAP_W - MAP_PAD*2);
        const oy = MAP_PAD + (o.z / GRID) * (MAP_H - MAP_PAD*2);
        mapCtx.beginPath(); mapCtx.arc(ox, oy, 1.5, 0, Math.PI*2); mapCtx.fill();
    });
    // Survivors
    SURVIVORS.forEach((s,i) => {
        const sx = MAP_PAD + (s.x / GRID) * (MAP_W - MAP_PAD*2);
        const sy = MAP_PAD + (s.z / GRID) * (MAP_H - MAP_PAD*2);
        mapCtx.beginPath(); mapCtx.arc(sx, sy, 3, 0, Math.PI*2);
        mapCtx.fillStyle = survivorMeshes[i]?.found ? '#00ff44' : '#ff3300'; mapCtx.fill();
        if (!survivorMeshes[i]?.found) { mapCtx.beginPath(); mapCtx.arc(sx, sy, 5, 0, Math.PI*2); mapCtx.strokeStyle='#ff440044'; mapCtx.lineWidth=1; mapCtx.stroke(); }
    });
    // Drone paths + positions
    drones.forEach((d, i) => {
        if (activeDrone >= 0 && activeDrone !== i) return;
        const color = DRONE_COLORS[i];
        if (d.path.length > 1) {
            mapCtx.beginPath(); mapCtx.strokeStyle = color + '66'; mapCtx.lineWidth = 1.2;
            d.path.forEach((pt, pi) => {
                const px = MAP_PAD + (pt.x / GRID) * (MAP_W - MAP_PAD*2);
                const py = MAP_PAD + (pt.z / GRID) * (MAP_H - MAP_PAD*2);
                if (pi === 0) mapCtx.moveTo(px, py); else mapCtx.lineTo(px, py);
            });
            mapCtx.stroke();
        }
        const p = d.group.position;
        const dx2 = MAP_PAD + (p.x / GRID) * (MAP_W - MAP_PAD*2);
        const dy2 = MAP_PAD + (p.z / GRID) * (MAP_H - MAP_PAD*2);
        const sr = (SCAN_RADIUS / GRID) * (MAP_W - MAP_PAD*2);
        mapCtx.beginPath(); mapCtx.arc(dx2, dy2, sr, 0, Math.PI*2); mapCtx.strokeStyle = color+'33'; mapCtx.lineWidth=0.8; mapCtx.stroke();
        mapCtx.beginPath(); mapCtx.arc(dx2, dy2, 4, 0, Math.PI*2); mapCtx.fillStyle = color; mapCtx.fill();
        mapCtx.fillStyle='#fff'; mapCtx.font='bold 7px sans-serif'; mapCtx.textAlign='center'; mapCtx.fillText(`${i+1}`, dx2, dy2+2.5);
    });
    // Target lines
    drones.forEach((d, i) => {
        if (activeDrone >= 0 && activeDrone !== i) return;
        if (d.target && d.state === 'moving') {
            const color = DRONE_COLORS[i], p = d.group.position;
            const dx2 = MAP_PAD + (p.x / GRID) * (MAP_W - MAP_PAD*2);
            const dy2 = MAP_PAD + (p.z / GRID) * (MAP_H - MAP_PAD*2);
            const tx = MAP_PAD + (d.target.x / GRID) * (MAP_W - MAP_PAD*2);
            const ty = MAP_PAD + (d.target.z / GRID) * (MAP_H - MAP_PAD*2);
            mapCtx.beginPath(); mapCtx.setLineDash([3,3]); mapCtx.strokeStyle=color+'88'; mapCtx.lineWidth=1;
            mapCtx.moveTo(dx2, dy2); mapCtx.lineTo(tx, ty); mapCtx.stroke(); mapCtx.setLineDash([]);
        }
    });
}

function spawnTree(cx, cz, tall, burned) {
    const trunkH = tall ? 10 + Math.random()*8 : 6 + Math.random()*5;
    const trunkR = 0.25 + Math.random()*0.25;
    const trunk = new THREE.Mesh(
        new THREE.CylinderGeometry(trunkR*0.7, trunkR, trunkH, 6),
        burned ? treeMaterials.trunkBurned : treeMaterials.trunk
    );
    trunk.position.set(cx, trunkH/2, cz);

    scene.add(trunk);
    registerObstacle(cx, cz, 1.2, trunkH + (burned ? 0 : 6)); // include canopy height buffer

    if (!burned) {
        const canopyR = 2 + Math.random()*2.5;
        const mats = [treeMaterials.canopyDark, treeMaterials.canopyMed, treeMaterials.canopyLight];
        const canopy = new THREE.Mesh(
            new THREE.SphereGeometry(canopyR, 7, 7),
            mats[Math.floor(Math.random()*mats.length)]
        );
        canopy.position.set(cx + (Math.random()-0.5)*1.5, trunkH + canopyR*0.4, cz + (Math.random()-0.5)*1.5);

        scene.add(canopy);
        // Second smaller canopy cluster for density
        if (Math.random() > 0.4) {
            const c2 = new THREE.Mesh(
                new THREE.SphereGeometry(canopyR*0.65, 6, 6),
                mats[Math.floor(Math.random()*mats.length)]
            );
            c2.position.set(cx + (Math.random()-0.5)*3, trunkH - 1 + Math.random()*2, cz + (Math.random()-0.5)*3);

            scene.add(c2);
        }
    } else {
        // Burned tree — sparse dead canopy
        if (Math.random() > 0.5) {
            const canopy = new THREE.Mesh(
                new THREE.SphereGeometry(1.5 + Math.random(), 5, 5),
                treeMaterials.canopyBurned
            );
            canopy.position.set(cx, trunkH + 0.5, cz);
            scene.add(canopy);
        }
    }
}

function spawnStone(cx, cz, scale=1) {
    const size = (0.5 + Math.random() * 1.5) * scale;
    const geo = new THREE.IcosahedronGeometry(size, 0);
    const mesh = new THREE.Mesh(geo, treeMaterials.stone);
    mesh.position.set(cx, size * 0.6, cz);
    mesh.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI);
    mesh.scale.set(1, 0.4 + Math.random() * 0.6, 1);

// ─── OBSTACLE AVOIDANCE (repulsive force field + stuck escape) ───
function computeAvoidanceSteer(pos, desiredDir) {
    let steerX = 0, steerZ = 0;
    let nearestDist = Infinity;
    for (const obs of obstacles) {
        // Height check: if drone is well ABOVE the obstacle, ignore it
        if (pos.y > obs.height + 1.5) continue;

        const dx = obs.x - pos.x, dz = obs.z - pos.z;
        const dist = Math.sqrt(dx*dx + dz*dz);
        const safeZone = obs.radius + 1.5;
        if (dist < AVOIDANCE_LOOKAHEAD + safeZone && dist > 0.01) {
            if (dist < nearestDist) nearestDist = dist;
            const urgency = Math.pow(Math.max(0, 1 - dist / (AVOIDANCE_LOOKAHEAD + safeZone)), 2);
            steerX -= (dx/dist) * urgency * 1.8;
            steerZ -= (dz/dist) * urgency * 1.8;
        }
    }
    return {x: steerX, z: steerZ, blocked: nearestDist < 3.5};
}

const clock = new THREE.Clock();

function animate() {
    requestAnimationFrame(animate);
    const dt = clock.getDelta();
    
    if (!isPaused) {
    elapsed += dt;
    frameCount++;

    // processBatchQueue(); // Logic moved to Agent

    // Fire animation
    fireParticles.forEach(f => {
        f.mesh.position.y = f.baseY + Math.sin(elapsed*f.speed+f.phase)*1.8;
        f.mesh.scale.setScalar(0.6 + Math.sin(elapsed*f.speed*2+f.phase)*0.4);
        f.mesh.material.opacity = 0.35 + Math.sin(elapsed*3+f.phase)*0.35;
    });
    smokePlanes.forEach(s => {
        s.mesh.material.opacity = 0.04 + Math.sin(elapsed*0.4+s.phase)*0.03;
        s.mesh.position.y += Math.sin(elapsed*0.3+s.phase)*0.003;
    });

    survivorMeshes.forEach((s,i) => {
        if (!s.found) {
            s.body.position.y = 0.8 + Math.sin(elapsed*1.5+i)*0.3;
            s.ring.scale.setScalar(1 + Math.sin(elapsed*2+i)*0.2);
        }
    });

    // Sector Visualization 
    Object.values(sectorMeshes).forEach(s => {
        if (s.scanned) {
            if (showScannedSectors) {
                s.mesh.material.color.setHex(0x3388ff);
                s.mesh.material.opacity = 0.35 + Math.sin(elapsed*2+s.mesh.position.x)*0.1;
                s.mesh.material.emissive.setHex(0x113355);
            } else {
                s.mesh.material.color.setHex(0x152215);
                s.mesh.material.opacity = 0.4;
                s.mesh.material.emissive.setHex(0x000000);
            }
        }
    });

    // Update drones
    drones.forEach((d,i) => {
        d.rotors.forEach(r => r.rotation.y += dt * 30);

        // After mission complete, stop all processing once drone is idle/at base
        if (missionComplete && (d.state === 'idle' || d.dead)) {
            scanSpheres[i].position.copy(d.group.position);
            return;
        }

        // Record path
        if (frameCount % PATH_SAMPLE_INTERVAL === 0 && (d.state==='moving'||d.state==='scanning')) {
            const p = d.group.position;
            const last = d.path[d.path.length-1];
            if (!last || Math.hypot(p.x-last.x, p.z-last.z) > 0.8) {
                d.path.push({x:p.x, z:p.z});
            }
        }

        // Wake up idle drones at base if there are unassigned sectors
        if (d.state === "idle" && !d.recharging && !d.dead && missionStarted && !missionComplete) {
            if (useLLM) {
                d.state = "waiting_orders";
                if (!assignmentQueue.includes(i)) {
                    assignmentQueue.push(i);
                    addThought(i, 'info', `Waiting for swarm coordinator...`);
                }
            } else {
                const s = getNextSector(d, i);
                if (s) {
                    d.target = {x:s.c*CELL+CELL/2, z:s.r*CELL+CELL/2, sector:s.k, hazard:s.hazard};
                    d.state = "moving";
                    addThought(i, 'action', `Waking up from standby. Moving to ${s.k}...`);
                }
            }
        }

        // Skip dead drones
        if (d.dead) {
            scanSpheres[i].visible = false;
            return;
        }

        // Global check for death (battery depleted or manually killed)
        if (d.battery <= 0) {
            if (d.target && d.target.sector) {
                const qs = globalQueue.find(q => q.k === d.target.sector);
                if (qs) qs.assigned = false; // release sector for other drones
                if (useLLM && mcpClient && mcpClient.connected) {
                    mcpClient.callTool('update_drone_assignment', {drone_id: `drone_${i+1}`, sector_id: '__RECALL__'}).catch(e=>console.warn(e));
                }
            }
            d.battery = 0; d.dead = true; d.state = 'idle'; d.recharging = false;
            d.group.position.y = 0.5; // crash to ground
            d.group.children[0].material.color.setHex(0x330000);
            d.group.children[0].material.emissive.setHex(0x110000);
            addThought(i, 'danger', `⚠️ BATTERY DEPLETED — drone down at (${d.group.position.x.toFixed(0)}, ${d.group.position.z.toFixed(0)})!`);
            addMCP(i, 'call', 'report_drone_loss', {drone_id:`drone_${i+1}`, location:[Math.round(d.group.position.x), Math.round(d.group.position.z)]}, {status:'crashed', battery:0});
            return;
        }

        if (d.recharging) {
            d.battery = Math.min(100, d.battery + dt * 25);
            if (d.battery >= 100) {
                d.recharging = false;
                if (missionComplete) {
                    d.state = "idle"; // Mission done — stay at base
                    scanSpheres[i].position.copy(d.group.position);
                    return;
                }
                addThought(i, 'action', `Recharged to 100%. Ready for deployment.`);
                addThought(i, 'action', `Recharged to 100%. Ready for deployment.`);
                // Waiting for external command via syncWithServer
                d.state = "idle";
            }
            d.group.position.y = 3 + Math.sin(elapsed*2+i)*0.15;
            scanSpheres[i].position.copy(d.group.position);
            return;
        }

        if (d.state === "moving" && d.target) {
            const p = d.group.position;
            const dx = d.target.x - p.x, dz = d.target.z - p.z;
            const dist = Math.sqrt(dx*dx + dz*dz);

            if (dist > 0.5) {
                const currentHazardMove = hazardOf(Math.floor(p.z/CELL), Math.floor(p.x/CELL));
                const baseSpd = MOVE_SPEED * (currentHazardMove==="fire"?0.6:1);
                let dirX = dx/dist, dirZ = dz/dist;
                if (d.escapeMode === "backtrack") {
                    // Strong force away from target
                    dirX = -dx/dist * 2.5; dirZ = -dz/dist * 2.5;
                } else if (d.escapeMode === "rising" && p.y < 18) {
                    // If rising but not high enough yet, don't move forward aggressively
                    dirX *= 0.1; dirZ *= 0.1;
                }

                // Apply obstacle avoidance
                const steer = computeAvoidanceSteer(p, {x:dirX, z:dirZ});
                dirX += steer.x;
                dirZ += steer.z;

                if (steer.blocked && d.avoidCount % 120 === 0) {
                    addThought(i, 'warning', `Obstacle nearby — adjusting course...`);
                }
                if (steer.x !== 0 || steer.z !== 0) d.avoidCount++;
                else d.avoidCount = 0;

                // STUCK DETECTION: every 40 frames (more sensitive)
                if (frameCount - d.stuckCheck.frame > 40) {
                    const moved = Math.hypot(p.x - d.stuckCheck.x, p.z - d.stuckCheck.z);
                    if (moved < 1.0 && d.state === 'moving' && d.escapeMode === "none") {
                        // STUCK! Try rising first, then backtracking
                        if (Math.random() > 0.4) {
                            d.escapeMode = "rising"; d.escapeTimer = 240;
                            d.targetHeight = 25; // Rise higher than any tree
                            addThought(i, 'danger', `STUCK — Climbing to 25u to clear canopy.`);
                        } else {
                            d.escapeMode = "backtrack"; d.escapeTimer = 120;
                            addThought(i, 'danger', `STUCK — Rerouting around density...`);
                        }
                    }
                    d.stuckCheck = {x: p.x, z: p.z, frame: frameCount};
                }

                // Escape timer logic
                if (d.escapeTimer > 0) {
                    d.escapeTimer--;
                    if (d.escapeTimer === 0) {
                        d.escapeMode = "none";
                        d.targetHeight = d.defaultHeight;
                        addThought(i, 'action', `Clear of obstacle. Resuming standard flight.`);
                    }
                }

                // Move
                const finalLen = Math.sqrt(dirX*dirX + dirZ*dirZ) || 1;
                p.x += (dirX / finalLen) * baseSpd;
                p.z += (dirZ / finalLen) * baseSpd;
                
                // Smooth altitude change with reduced bobbing
                p.y += (d.targetHeight - p.y) * 0.04 + Math.sin(elapsed*1.5+i)*0.15;

                const lookTarget = new THREE.Vector3(p.x + dirX*3, p.y, p.z + dirZ*3);
                d.group.lookAt(lookTarget);

                // Battery drain — proportional to distance moved (frame-rate independent)
                const currentSector = `S${Math.floor(p.z/CELL)}_${Math.floor(p.x/CELL)}`;
                const currentHazard = hazardOf(Math.floor(p.z/CELL), Math.floor(p.x/CELL));
                const mult = currentHazard==="fire"?3:currentHazard==="smoke"?1.5:1;
                d.battery -= baseSpd * DRAIN_PER_UNIT * mult;

                // Smart RTB: estimate battery needed to return (same formula + 40% path overhead + margin)
                const distToBase = Math.hypot(d.group.position.x - BASE.x, d.group.position.z - BASE.z);
                const batteryToReturn = distToBase * DRAIN_PER_UNIT * 1.4 + 8;
                if (d.battery < batteryToReturn && d.target.sector) {
                    const qs = globalQueue.find(q => q.k === d.target.sector);
                    if (qs) qs.assigned = false; // release sector for other drones
                    if (useLLM && mcpClient && mcpClient.connected) {
                        mcpClient.callTool('update_drone_assignment', {drone_id: `drone_${i+1}`, sector_id: '__RECALL__'}).catch(e=>console.warn(e));
                    }
                    addThought(i, 'danger', `Battery ${d.battery.toFixed(0)}% — est. ${batteryToReturn.toFixed(0)}% needed to RTB. Returning NOW!`);
                    d.target = {x:BASE.x, z:BASE.z, sector:null, hazard:"clear"};
                    d.state = "moving";
                }
            } else {
                if (d.target.sector) {
                    d.state = "scanning"; d.scanTimer = 0;
                    addMCP(i, 'call', 'thermal_scan', {drone_id:`drone_${i+1}`, sector:d.target.sector}, {status:'scanning', radius:SCAN_RADIUS});
                    addThought(i, 'action', `Reached sector ${d.target.sector}. Deploying thermal scan (radius: ${SCAN_RADIUS}u)...`);
                } else {
                    // Reached base
                    if (missionComplete) {
                        d.state = "idle"; // Mission done — park at base
                        d.group.position.set(BASE.x + i*2, 3, BASE.z + i*2);
                    } else {
                        d.recharging = true; d.state = "idle";
                        addMCP(i, 'call', 'recall_for_charging', {drone_id:`drone_${i+1}`}, {status:'charging', base:[BASE.x,BASE.z]});
                        addThought(i, 'action', `At base. Charging...`);
                    }
                }
            }
        } // End of state === "moving"

        if (d.state === "scanning") {
            d.scanTimer += dt;
            d.group.position.y = DRONE_FLY_HEIGHT + Math.sin(elapsed*4)*0.4;
            d.group.rotation.y += dt * 0.8;
            scanSpheres[i].material.color.setHex(0x00ff88);
            scanSpheres[i].material.opacity = 0.06 + Math.sin(elapsed*5)*0.04;

            if (d.scanTimer > 2.0) {
                if (d.target && d.target.sector) {
                    sectorMeshes[d.target.sector].scanned = true;
                    sectorMeshes[d.target.sector].mesh.material.color.setHex(0x152215);
                    sectorMeshes[d.target.sector].mesh.material.opacity = 0.4;
                    checkSurvivorsNearDrone(d, i);
                    d.sectorsScanned++;
                    
                    const qs = globalQueue.find(q => q.k === d.target.sector);
                    if (qs) qs.assigned = false;
                    
                    addMCP(i, 'call', 'scan_sector', {drone_id:`drone_${i+1}`, sector:d.target.sector}, {scanned:true, survivors_in_range: survivorMeshes.filter(s=>s.found).length});
                    addThought(i, 'reason', `Scan done: ${d.target.sector}. Bat: ${d.battery.toFixed(0)}%. Total: ${d.sectorsScanned} sectors.`);
                    d.battery -= 0.2; // Drain exactly once for the scan
                }
                scanSpheres[i].material.color.setHex(0x0066ff);
                scanSpheres[i].material.opacity = 0.04;

                if (d.battery <= 0) {
                    d.battery = 0; d.dead = true; d.state = 'idle';
                    d.group.position.y = 0.5;
                    d.group.children[0].material.color.setHex(0x330000);
                    d.group.children[0].material.emissive.setHex(0x110000);
                    addThought(i, 'danger', `⚠️ BATTERY DEPLETED during scan — drone down!`);
                    return;
                }

                // CHECK GLOBAL MISSION COMPLETION BEFORE QUEUING
                const scanned = Object.values(sectorMeshes).filter(sec=>sec.scanned).length;
                const scannable = Object.values(sectorMeshes).filter(sec=>sec.hazard!=="no_fly").length;
                let isComplete = (missionGoal === 'scanAll') ? (scanned === scannable) : (totalFound >= totalSurvivorsInitially || scanned === scannable);

                if (isComplete && !missionComplete) {
                    missionComplete = true;
                    drones.forEach((allD, dIdx) => {
                        if (!allD.dead) {
                            allD.target = {x:BASE.x, z:BASE.z, sector:null, hazard:"clear"};
                            allD.state = "moving";
                            if (dIdx === i) addThought(dIdx, 'info', `Mission Objective Met [${missionGoal}]. Fleet returning to base.`);
                        }
                    });
                    const totalTime = formatTime((performance.now() - missionStartTime - totalPausedTime) / 1000);
                    addThought(-1, 'phase', 'PHASE 4: MISSION COMPLETE — Summary');
                    addThought(-1, 'info', `Final Goal Progress: ${missionGoal === 'scanAll' ? (scanned+'/'+scannable+' sectors') : (totalFound+'/'+totalSurvivorsInitially+' survivors')}`);
                    addThought(i, 'alert', `🎯 MISSION SUCCESS! [Total Time: ${totalTime}]`);
                    addMCP(i, 'call', 'finalize_mission', {completion_time:totalTime, goal:missionGoal}, {status:'mission_complete'});
                    document.getElementById('final-time').textContent = totalTime;
                    document.getElementById('final-found').textContent = `${totalFound}/${totalSurvivorsInitially}`;
                    document.getElementById('final-sectors').textContent = `${scanned}/${scannable}`;
                    document.getElementById('success-modal').style.display = 'flex';
                    d.state = "moving"; // We are already RTB-ing above
                } else if (!missionComplete) {
                    // IMMEDIATE ASSIGNMENT — push to batch queue
                    if (useLLM) {
                        d.state = "waiting_orders";
                        if (!assignmentQueue.includes(i)) {
                            assignmentQueue.push(i);
                        }
                    } else {
                        d.state = "waiting_orders";
                        addThought(i, 'danger', `Local brain deactivated. Waiting for MCP...`);
                    }
                } else {
                    d.state = "moving"; // Returning to base
                }
            }
        }


        scanSpheres[i].position.copy(d.group.position);
        d.battery = Math.max(0, d.battery);
    });


    // Camera
    // Camera follow
    if (activeDrone >= 0 && activeDrone < drones.length) {
        const dp = drones[activeDrone].group.position;
        // Move camera + target by how much the drone moved this frame
        if (!drones[activeDrone]._lastCamPos) {
            drones[activeDrone]._lastCamPos = dp.clone();
            // Initial position: behind and above the drone
            cam.position.set(dp.x, dp.y + 12, dp.z - 18);
            controls.target.set(dp.x, dp.y, dp.z);
        }
        const delta = dp.clone().sub(drones[activeDrone]._lastCamPos);
        cam.position.add(delta);
        controls.target.add(delta);
        drones[activeDrone]._lastCamPos.copy(dp);
    } else if (activeDrone === -3) {
        // Swarm Group Tracking Camera
        let minX = Infinity, minZ = Infinity, maxX = -Infinity, maxZ = -Infinity;
        let activeCount = 0;
        drones.forEach(d => {
            if (!d.dead) {
                minX = Math.min(minX, d.group.position.x);
                minZ = Math.min(minZ, d.group.position.z);
                maxX = Math.max(maxX, d.group.position.x);
                maxZ = Math.max(maxZ, d.group.position.z);
                activeCount++;
            }
        });
        if (activeCount > 0) {
            const cx = (minX + maxX) / 2;
            const cz = (minZ + maxZ) / 2;
            const span = Math.max(maxX - minX, maxZ - minZ);
            
            controls.target.lerp(new THREE.Vector3(cx, 0, cz), 0.05);

            const maxDist = Math.max(40, span * 1.5 + 20); 
            const desiredCamPos = new THREE.Vector3(cx, maxDist * 0.8, cz + maxDist * 0.5);
            cam.position.lerp(desiredCamPos, 0.05);
        } else {
            // All dead, aim at base
            controls.target.lerp(new THREE.Vector3(BASE.x, 0, BASE.z), 0.05);
            cam.position.lerp(new THREE.Vector3(BASE.x, 30, BASE.z + 30), 0.05);
        }
    }

    controls.update();
    updateStatus();
    drawMinimap();
    renderThoughts();

    // Update drone overlay labels
    for (let i = 0; i < 5; i++) {
        const label = document.getElementById(`drone-label-${i}`);
        if (!label) continue;
        
        const d = drones[i];
        // Hide if drone doesn't exist, is in camera view, or mission not started
        if (!d || !missionStarted || activeDrone >= 0) {
            label.style.display = 'none';
            continue;
        }

        label.style.display = 'block';

        // Project 3D position to screen
        const pos3 = d.group.position.clone();
        pos3.y += 3.5; // Adjusted height above drone
        pos3.project(cam);
        
        const x = (pos3.x * 0.5 + 0.5) * window.innerWidth;
        const y = (-(pos3.y) * 0.5 + 0.5) * window.innerHeight;

        // Hide if behind camera
        if (pos3.z > 1) { 
            label.style.display = 'none'; 
            continue; 
        }

        label.style.left = Math.round(x) + 'px';
        label.style.top = Math.round(y) + 'px';

        const statusText = d.dead ? 'CRASHED' : d.recharging ? 'CHARGING' : d.state === 'scanning' ? 'SCANNING' : d.state === 'moving' ? 'MOVING' : 'IDLE';
        const batClass = d.dead ? 'dead' : d.battery < 25 ? 'low' : '';
        const distToBase = Math.hypot(d.group.position.x - BASE.x, d.group.position.z - BASE.z);
        const estRTB = (distToBase * DRAIN_PER_UNIT * 1.4 + 8).toFixed(0);
        const color = DRONE_COLORS[i];

        label.innerHTML = `<span class="dl-name" style="color:${color}">D${i+1}</span> ${statusText}<br>`
            + `<span class="dl-bat ${batClass}">⚡${d.battery.toFixed(0)}%</span>`
            + (d.dead ? '' : ` <span class="dl-rtb">← RTB: ~${estRTB}%</span>`);
    }

    } // End of if (!isPaused)

    renderer.render(scene, cam);
}
animate();

addEventListener('resize', () => {
    cam.aspect = innerWidth/innerHeight;
    cam.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
});

// ─── MCP SYNC LOOP ───
let isSyncing = false;
async function syncWithServer() {
    if (isSyncing || !mcpClient || !mcpClient.connected) return;
    isSyncing = true;
    try {
        const scanned = Object.keys(sectorMeshes).filter(k => sectorMeshes[k].scanned);
        await mcpClient.callTool('update_environment', { scanned_sectors: scanned });
        for(let i=0; i<drones.length; i++) {
            const d = drones[i];
            const safeBat = Number.isFinite(d.battery) ? Math.max(0, d.battery) : 0;
            const safeX = Number.isFinite(d.group.position.x) ? d.group.position.x : 0;
            const safeY = Number.isFinite(d.group.position.y) ? d.group.position.y : 0;
            const safeZ = Number.isFinite(d.group.position.z) ? d.group.position.z : 0;
            
            await mcpClient.callTool('update_drone_state', {
                drone_id: `drone_${i+1}`,
                battery: safeBat,
                x: safeX,
                y: safeY,
                z: safeZ,
                status: safeBat <= 0 ? 'offline' : (d.recharging ? 'charging' : (d.state === 'idle' ? 'active' : d.state))
            });
        }
        const resp = await mcpClient.callTool('get_world_state', {});
        if (resp && resp.content && resp.content.length > 0) {
            const world = JSON.parse(resp.content[0].text);
            
            // Sync Hazards and Scanned Status
            Object.keys(world.sectors).forEach(sid => {
                const sServer = world.sectors[sid];
                const sm = sectorMeshes[sid];
                if (sm) {
                    // Update hazard if it changed or for initial alignment
                    if (sm.hazard !== sServer.hazard) {
                        sm.hazard = sServer.hazard;
                    }
                    if (sServer.scanned) {
                        sm.scanned = true;
                    }
                }
            });

            // Sync Drone Assignments
            Object.keys(world.drones).forEach(did => {
                const idx = parseInt(did.split('_')[1]) - 1;
                const d = drones[idx];
                if (!d) return; 
                const sDrone = world.drones[did];
                if (sDrone.target_sector && (!d.target || d.target.sector !== sDrone.target_sector)) {
                    const qIdx = assignmentQueue.indexOf(idx);
                    if (qIdx > -1) assignmentQueue.splice(qIdx, 1);
                    if (sDrone.target_sector === "__RECALL__") {
                         d.target = {x: BASE.x, z: BASE.z, sector: null, hazard: "clear"};
                         d.state = "moving";
                    } else {
                        const sm = sectorMeshes[sDrone.target_sector];
                        if (sm) {
                            d.target = {x: sm.c*CELL+CELL/2, z: sm.r*CELL+CELL/2, sector: sDrone.target_sector, hazard: sm.hazard};
                            d.state = "moving";
                            addThought(idx, 'action', `Order received: Proceed to ${sDrone.target_sector}`);
                        }
                    }
                }
            });
        }
    } catch(e) { console.warn("Sync failed:", e); }
    finally { isSyncing = false; }
}
setInterval(syncWithServer, 500);
</script>
